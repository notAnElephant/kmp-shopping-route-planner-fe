components:
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
  schemas:
    RoutePlanningRequest:
      type: "object"
      properties:
        mapId:
          type: "integer"
          format: "int32"
        departmentIds:
          type: "array"
          items:
            type: "integer"
            format: "int32"
      required:
        - "mapId"
        - "departmentIds"
    Pair:
      type: "object"
      properties: { }
    RoutePlanResponse:
      type: "object"
      properties:
        route:
          type: "array"
          items:
            $ref: "#/components/schemas/Pair"
      required:
        - "route"
    CreateDepartmentRequest:
      type: "object"
      properties:
        mapId:
          type: "integer"
          format: "int32"
        name:
          type: "string"
        startX:
          type: "number"
          format: "double"
        startY:
          type: "number"
          format: "double"
        width:
          type: "number"
          format: "double"
        height:
          type: "number"
          format: "double"
      required:
        - "mapId"
        - "name"
        - "startX"
        - "startY"
        - "width"
        - "height"
    DepartmentResponse:
      type: "object"
      properties:
        id:
          type: "integer"
          format: "int32"
          nullable: true
        name:
          type: "string"
        mapId:
          type: "integer"
          format: "int32"
        startX:
          type: "number"
          format: "double"
        startY:
          type: "number"
          format: "double"
        width:
          type: "number"
          format: "double"
        height:
          type: "number"
          format: "double"
      required:
        - "name"
        - "mapId"
        - "startX"
        - "startY"
        - "width"
        - "height"
    UpdateDepartmentRequest:
      type: "object"
      properties:
        id:
          type: "integer"
          format: "int32"
        mapId:
          type: "integer"
          format: "int32"
        name:
          type: "string"
        startX:
          type: "number"
          format: "double"
        startY:
